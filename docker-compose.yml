services:
  laravel:
    image: dunglas/frankenphp:1-php8.3
    working_dir: /app
    volumes:
      - ./hestiapredict:/app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      AI_ENGINE_URL: http://ai-engine:8001
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - ai-engine

  ai-engine:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./hestia-ai:/app
    ports:
      - "8001:8001"
    command: sh -c "pip install fastapi uvicorn pandas prophet && uvicorn main:app --host 0.0.0.0 --port 8001"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hestiapredict
      POSTGRES_USER: hestia
      POSTGRES_PASSWORD: hestia
    ports:
      - "5432:5432"
    volumes:
      - hestia_pgdata:/var/lib/postgresql/data

volumes:
  hestia_pgdata:
